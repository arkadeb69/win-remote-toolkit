<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workstation Status - PC Remote Lock</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="landing-body">
    <!-- Floating background decorative mesh orbs -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <div class="container landing-container">
        <!-- Live status header -->
        <div class="live-badge-container">
            <div class="live-badge">
                <span class="live-dot"></span>
                <span class="live-badge-text">LIVE</span>
            </div>
            <div class="badge-sub-indicators">
                <span class="badge-sub-text">Server Connected</span>
                <span class="badge-sub-divider">•</span>
                <span class="badge-sub-text text-accent">Remote Access Ready</span>
            </div>
        </div>

        <!-- Headline & Subheading -->
        <div class="hero-section">
            <h1 class="hero-headline">Arkadeb is working on his laptop.</h1>
            <p class="hero-subheading">This workstation is currently online and accepting authenticated remote commands.</p>
        </div>

        <!-- Live Presence Card -->
        <div class="card glass-card presence-card" id="presence-card">
            <div class="presence-header">
                <div class="presence-title-group">
                    <h2 class="card-title" id="presence-title">🟢 Live Presence</h2>
                </div>
                <div class="live-indicator-badge" id="live-indicator-badge">
                    <span class="glowing-dot"></span>
                    <span class="live-label">LIVE</span>
                </div>
            </div>
            
            <div class="presence-grid">
                <div class="presence-item">
                    <span class="presence-label">Status</span>
                    <span class="presence-value text-success" id="presence-status">Online</span>
                </div>

                <div class="presence-item" id="session-started-item">
                    <span class="presence-label">Session Started</span>
                    <span class="presence-value" id="presence-session-started">--</span>
                </div>
                <div class="presence-item" id="live-duration-item">
                    <span class="presence-label">Live Duration</span>
                    <span class="presence-value font-mono" id="presence-live-duration">--h --m --s</span>
                </div>
                <div class="presence-item" id="last-seen-item" style="display: none;">
                    <span class="presence-label">Last Seen</span>
                    <span class="presence-value" id="presence-last-seen">--</span>
                </div>
                <div class="presence-item">
                    <span class="presence-label">Device</span>
                    <span class="presence-value" id="presence-device">Destructive-LOQ</span>
                </div>
            </div>
        </div>

        <!-- Continue Button -->
        <div class="action-footer">
            <a href="{{ url_for('login') }}" class="btn-primary btn-glow btn-landing-continue">
                <span>Continue to Login</span>
                <span class="btn-arrow">→</span>
            </a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
